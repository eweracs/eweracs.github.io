<link rel="icon" href="/icon.svg" type="image/svg+xml" sizes="any">
<!-- Set the theme before first paint to avoid a flash of the wrong mode:
     stored choice wins, otherwise follow the OS preference. -->
<script>
(function () {
	try {
		var stored = localStorage.getItem("italify-theme");
		var theme = stored || (window.matchMedia &&
			window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
		document.documentElement.setAttribute("data-theme", theme);
	} catch (e) {}
})();
</script>
<script>
(function () {
	var map = { "installation": "installation", "workflow": "workflow", "filter": "filter", "parameters": "filter", "saving-parameters": "filter", "export": "filter", "hidden-settings": "filter", "groups": "groups", "tagger": "tagger", "preview": "tagger", "stem-marks": "stems", "stems": "stems", "creating-stems": "stems", "anchor-edges": "stems", "hinge-corners": "stems", "flip-axis": "stems", "extras": "stems", "corner-swap": "stems", "corruption": "stems", "node-flags": "tags", "limit-curve": "tags", "no-curve-correction": "tags", "inktrap": "tags", "snap-y": "tags", "terminal": "tags", "anchor-links": "anchor-links", "copy-paste": "copy-paste", "masters": "copy-paste", "glyph-menu": "glyph-menu", "tips": "tips", "shortcuts": "shortcuts" };
	var hash = location.hash.slice(1);
	if (hash && map[hash]) location.replace(map[hash] + "#" + hash);
})();
</script>
<link rel="stylesheet" href="../styles.css?v=23">
